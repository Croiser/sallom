version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: dodile_user
      POSTGRES_PASSWORD: dodile_password
      POSTGRES_DB: dodile_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://dodile_user:dodile_password@db:5432/dodile_db?schema=public"
      JWT_SECRET: "sua_chave_secreta_aqui"
      NODE_ENV: production
    depends_on:
      - db

volumes:
  postgres_data:
